<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DumbGenius AI Download</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: radial-gradient(circle at top, rgba(166, 124, 255, 0.14), transparent 24%), linear-gradient(180deg, #09070f 0%, #05030a 100%);
      --surface: rgba(22, 18, 40, 0.92);
      --surface-strong: rgba(30, 24, 56, 0.96);
      --surface-lighter: rgba(255, 255, 255, 0.04);
      --text: #ece8ff;
      --muted: #ab9ce2;
      --accent: #a67cff;
      --accent-strong: #bb9dff;
      --button-secondary-bg: rgba(255, 255, 255, 0.08);
      --button-secondary-text: var(--text);
      --border: rgba(255, 255, 255, 0.08);
      --shadow: 0 24px 80px rgba(0, 0, 0, 0.28);
      --radius: 30px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      min-height: 100%;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    body {
      display: flex;
      justify-content: center;
      padding: 24px;
    }

    .frame {
      width: min(100%, 980px);
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      overflow: hidden;
      display: grid;
      gap: 20px;
    }

    .header {
      padding: 32px;
      background: linear-gradient(135deg, rgba(166, 124, 255, 0.16), rgba(255, 255, 255, 0.08));
      backdrop-filter: blur(12px);
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 4vw, 2.8rem);
      letter-spacing: -0.04em;
    }

    .subtitle {
      margin-top: 18px;
      color: var(--muted);
      line-height: 1.7;
      max-width: 720px;
      font-size: 1rem;
    }

    .content {
      padding: 32px;
      display: grid;
      gap: 20px;
    }

    .section {
      padding: 26px;
      border-radius: 28px;
      border: 1px solid var(--border);
      background: var(--surface-lighter);
    }

    .section h2 {
      margin: 0 0 12px;
      font-size: 1rem;
      color: var(--accent);
    }

    .section p,
    .section pre {
      margin: 0;
      color: var(--text);
      font-size: 1rem;
      line-height: 1.75;
      white-space: pre-wrap;
      word-break: break-word;
    }

    pre {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 22px;
      padding: 22px;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 14px;
      padding: 0 32px 32px;
    }

    button {
      border: none;
      border-radius: 999px;
      padding: 14px 24px;
      font-weight: 700;
      cursor: pointer;
      background: linear-gradient(135deg, #c994ff, #8970ff);
      color: #0f0b19;
      box-shadow: 0 14px 24px rgba(0, 0, 0, 0.18);
      transition: transform 0.18s ease, filter 0.18s ease;
    }

    .button-secondary {
      background: var(--button-secondary-bg);
      color: var(--button-secondary-text);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: none;
    }

    button:hover {
      transform: translateY(-2px);
      filter: brightness(1.05);
    }

    @media (max-width: 680px) {
      body {
        padding: 18px;
      }

      .frame {
        width: 100%;
      }

      .header,
      .content,
      .actions {
        padding: 22px;
      }

      .actions {
        justify-content: center;
      }
    }
  </style>
</head>
<body>
  <article class="frame">
    <header class="header">
      <h1>DumbGenius AI Download</h1>
      <p class="subtitle">Review your saved wisdom here, then use the button below to print or save as PDF from your browser.</p>
    </header>
    <section class="content">
      <div class="section">
        <h2>Question</h2>
        <p id="question-text">Loading question…</p>
      </div>
      <div class="section">
        <h2>Answer</h2>
        <pre id="answer-text">Loading answer…</pre>
      </div>
      <div class="actions">
        <button id="back-button" type="button" class="button-secondary">Back to DumbGenius AI</button>
        <button id="print-button" type="button">Save as PDF</button>
      </div>
    </section>
  </article>

  <script>
    function getParam(name) {
      return new URLSearchParams(window.location.search).get(name) || "";
    }

    function decode(value) {
      try {
        return decodeURIComponent(value.replace(/\+/g, " "));
      } catch (e) {
        return value;
      }
    }

    const question = decode(getParam("question"));
    const answer = decode(getParam("answer"));

    document.getElementById("question-text").textContent = question || "No question entered.";
    document.getElementById("answer-text").textContent = answer || "No answer available.";

    document.getElementById("back-button").addEventListener("click", () => {
      if (window.opener && !window.opener.closed) {
        window.close();
      } else {
        window.location.href = "index.html";
      }
    });

    document.getElementById("print-button").addEventListener("click", () => {
      window.print();
    });
  </script>
</body>
</html>
